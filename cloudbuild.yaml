substitutions:
  _IMAGE: us-east1-docker.pkg.dev/hermes-ai-agent-497702/tonymuzo-apps/app:manual
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.cloudrun
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
